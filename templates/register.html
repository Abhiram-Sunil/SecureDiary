<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2965/2965879.png">
    <title>Register - SecureDiary</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar custom-navbar">

    <div class="logo-text">
        <i class="fas fa-book-open"></i>
        SecureDiary
    </div>

    <div class="nav-links">

        <a href="/">Home</a>

        <a href="/login">Login</a>

        <a href="/register">Register</a>

    </div>

</nav>
<br>

<div class="auth-card">

    <h1 class="text-center mb-4">
        <i class="fas fa-user-plus"></i>
        <br>
        Create Account
    </h1>

    <div class="container d-flex justify-content-center align-items-center">

    <div class="glass-card p-5 mt-5" style="width: 500px; max-width: 95%;">


    <form method="POST">

        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="mb-3">
        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        </div>

        <div class="mb-4">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-success w-100 custom-btn">
            <i class="fas fa-user-check"></i>
            Register
        </button>

    </form>
        </div>

</div>

    <div class="text-center mt-4">
        Already have an account?
        <a href="/login" class="text-warning">Login</a>
    </div>

</div>

</body>
</html>
