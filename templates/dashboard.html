<!DOCTYPE html>
<div class="container main-container">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h1 class="page-title">
                Welcome, {{ session.username }} 👋
            </h1>
        </div>

        <div>
            <a href="/add" class="btn add-btn custom-btn text-white">
                <i class="fas fa-plus"></i>
                New Entry
            </a>
        </div>

    </div>

    <div class="row">

        {% for entry in entries %}

        <div class="col-md-6 mb-4">

            <div class="glass-card h-100">

                <div class="diary-title">
                    <i class="fas fa-calendar-alt"></i>
                    Diary Entry
                </div>

                <div class="diary-content mb-4">
                    {{ entry[1] }}
                </div>

                <div class="d-flex gap-2">

                    <a href="/edit/{{ entry[0] }}" class="btn btn-warning custom-btn">
                        <i class="fas fa-edit"></i>
                        Edit
                    </a>

                    <a href="/delete/{{ entry[0] }}" class="btn btn-danger custom-btn">
                        <i class="fas fa-trash"></i>
                        Delete
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<div class="footer">
    SecureDiary © 2026 | Flask • Docker • AWS
</div>

</body>
</html>
